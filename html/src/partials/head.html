  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#3598DC">
  {% if pageDescription %}<meta name="description" content="{{ pageDescription }}">{% endif %}
  {% if pageKeywords %}<meta name="keywords" content="{{ pageKeywords }}">{% endif %}

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{ title | default('BlackMoon Admin Kit') }}">
  {% if pageDescription %}<meta property="og:description" content="{{ pageDescription }}">{% endif %}
  {% if pageImage %}<meta property="og:image" content="{{ pageImage }}">{% endif %}
  {% if pageUrl %}<meta property="og:url" content="{{ pageUrl }}">{% endif %}
  {% if pageUrl %}<link rel="canonical" href="{{ pageUrl }}">{% endif %}

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ title | default('BlackMoon Admin Kit') }}">
  {% if pageDescription %}<meta name="twitter:description" content="{{ pageDescription }}">{% endif %}
  {% if pageImage %}<meta name="twitter:image" content="{{ pageImage }}">{% endif %}

  <!-- Performance hints -->
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">

  <!-- Core styles (single entry) -->
  <link rel="stylesheet" href="/src/scss/app.scss" />
  {% if pageStyles %}
  <link rel="stylesheet" href="/src/scss/page-styles.scss" />
  {% endif %}
